<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--* CSS Style Sheets -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap.css.map">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <!--* Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Great+Vibes&family=Lavishly+Yours&family=Petit+Formal+Script&display=swap"
        rel="stylesheet">
    <title>Techflux</title>
</head>

<body>
    <!--* Home Section -->
    <section id="home" class="home-section">

        <div class="back-effect bg-1"></div>
        <div class="back-effect bg-2"></div>

        <div class="container">
            <div class="section-content">
                <h5 class="top-text">Studio ⇼ Agatho</h5>

                <div class="home-images">
                    <img src="./images/home-1.png" alt="Home Image" class="image-1">
                    <img src="./images/home-2.png" alt="Home Image" class="image-2">
                </div>

                <img src="./images/text-image.png" alt="" class="text-img">

                <h1 class="home-heading">Branding
                    & <span class="active">Design</span></h1>

                <button class="button" onclick="location.href='#services'">
                    <span class="text">Fead More</span>
                    <svg class="arrow" viewBox="0 0 448 512" height="1em" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </section>
    <!--* JS Script -->
    <script src="./js/script.js"></script>
    <script src="./js/all.min.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/bootstrap.bundle.js.map"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
</body>

</html>
